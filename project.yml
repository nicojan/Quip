name: Quip
options:
  bundleIdPrefix: com.nicojan
  deploymentTarget:
    macOS: "14.6"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    majorVersion: 2.6.0
  SDWebImageSwiftUI:
    url: https://github.com/SDWebImage/SDWebImageSwiftUI
    majorVersion: 3.1.0
  SDWebImage:
    url: https://github.com/SDWebImage/SDWebImage
    majorVersion: 5.19.0
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    majorVersion: 2.0.0

targets:
  Quip:
    type: application
    platform: macOS
    sources:
      - path: Quip
        excludes:
          - "**/.DS_Store"
    dependencies:
      - package: Sparkle
      - package: SDWebImageSwiftUI
      - package: SDWebImage
      - package: KeyboardShortcuts
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicojan.Quip
        PRODUCT_NAME: Quip
        MARKETING_VERSION: "1.1.2"
        CURRENT_PROJECT_VERSION: "5"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.6"
        INFOPLIST_FILE: Quip/Info.plist
        CODE_SIGN_ENTITLEMENTS: Quip/Quip.entitlements
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.social-networking"
      configs:
        # Only the Release build (Archive) carries the Developer ID team, so Debug
        # can sign ad-hoc and share a Team ID with the ad-hoc xctest bundle.
        Release:
          DEVELOPMENT_TEAM: "3CY4DX3K45"
    scheme:
      testTargets:
        - QuipTests

  QuipTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: QuipTests
    dependencies:
      - target: Quip
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nicojan.QuipTests
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.6"
        GENERATE_INFOPLIST_FILE: true
